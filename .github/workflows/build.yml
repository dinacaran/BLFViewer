name: Build, Sign and Release

# Triggers on every push of a version tag (e.g. v0.1.0)
# Also allows manual trigger from the Actions tab
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

# Write permission required to create GitHub Releases
permissions:
  contents: write
  id-token: write   # Required for SignPath origin verification

jobs:
  # ── Job 1: Build the EXE ────────────────────────────────────────────────
  build:
    name: Build on Windows
    runs-on: windows-latest

    steps:
      # 1. Check out source
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Set up Python
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      # 3. Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      # 4. Build with PyInstaller
      - name: Build portable EXE
        run: pyinstaller BLFViewer.spec

      # 5. Verify the EXE was produced
      - name: Verify build output
        shell: pwsh
        run: |
          if (!(Test-Path "dist\BLFViewer\BLFViewer.exe")) {
            Write-Error "Build failed: BLFViewer.exe not found"
            exit 1
          }
          Write-Host "Build succeeded."

      # 6. Zip the dist folder
      #    SignPath receives this zip, signs BLFViewer.exe inside it,
      #    and returns a new zip with the signed exe.
      - name: Zip dist folder
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $zipName = "BLFViewer_${tag}_Windows.zip"
          Compress-Archive -Path "dist\BLFViewer\*" -DestinationPath $zipName
          Write-Host "Created: $zipName"

      # 7. Upload unsigned zip as a workflow artifact so the sign job can fetch it
      - name: Upload unsigned artifact
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-zip
          path: BLFViewer_*_Windows.zip
          retention-days: 1

  # ── Job 2: Sign the EXE via SignPath ────────────────────────────────────
  sign:
    name: Sign with SignPath
    needs: build
    runs-on: ubuntu-latest

    steps:
      # Submit the unsigned zip to SignPath.
      # SignPath finds BLFViewer.exe inside (per your artifact configuration),
      # signs it with Authenticode, and returns the zip with the signed exe.
      - name: Sign via SignPath Foundation
        uses: signpath/github-action-submit-signing-request@v1
        with:
          api-token:              '${{ secrets.SIGNPATH_API_TOKEN }}'
          organization-id:        '${{ secrets.SIGNPATH_ORG_ID }}'
          project-slug:           'BLFViewer'
          signing-policy-slug:    'release-signing'
          artifact-configuration-slug: 'initial-version'
          github-artifact-name:   'unsigned-zip'
          wait-for-completion:    true
          output-artifact-name:   'signed-zip'

  # ── Job 3: Publish GitHub Release with signed zip ───────────────────────
  release:
    name: Publish Release
    needs: sign
    runs-on: ubuntu-latest

    steps:
      # Download the signed zip produced by SignPath
      - name: Download signed artifact
        uses: actions/download-artifact@v4
        with:
          name: signed-zip

      # Create the GitHub Release and attach the signed zip
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: BLFViewer_*_Windows.zip
          generate_release_notes: false
          body: |
            ## BLF Viewer ${{ github.ref_name }}

            ### Installation
            1. Download `BLFViewer_${{ github.ref_name }}_Windows.zip`
            2. Unzip anywhere
            3. Run `BLFViewer.exe` — no Python installation required

            > ✅ This release is digitally signed. Publisher: **GDLabs**
            > No SmartScreen warning after running once.

            ### Requirements
            - Windows 10 or later (64-bit)

            ### Changes
            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md)

            ### Disclaimer
            For offline analysis only. See [DISCLAIMER.md](https://github.com/${{ github.repository }}/blob/main/DISCLAIMER.md)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
